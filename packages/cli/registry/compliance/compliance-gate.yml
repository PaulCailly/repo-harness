# Privacy & compliance gate — deterministic, runs on every PR.
#
# Scans the source roots defined in scripts/compliance/config.mjs for concrete
# privacy signals that protect the governed-egress guarantee: an un-allowlisted
# network destination, a server-only secret reachable from the browser bundle,
# a hardcoded credential, or telemetry outside the analytics seam. A `violation`
# exits non-zero and FAILS the check; tracked risks (high/medium/low) are scored
# and surfaced but never block.
#
# The policy is data (scripts/compliance/config.mjs + controls.mjs) — this job
# is dependency-free pure Node 22, so it needs no install and runs in seconds.
# It is also the deterministic grounding the AI `/compliance` audit reads (see
# compliance.yml).
#
# Default enforcement mode: report (informational, --no-fail).
# Violations are scored and surfaced in the step summary but the check never
# fails.  To make violations block the PR, set:
#   features.compliance.mode = "block"
# in gatekit.json.  In block mode the analyzer exits non-zero on a
# violation, and bash pipefail propagates that exit through the tee pipe.

name: Compliance gate

on:
  pull_request:

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve enforcement mode
        id: rh
        run: |
          MODE=$(node -e "try{const m=JSON.parse(require('fs').readFileSync('gatekit.json','utf8'));process.stdout.write((m.features&&m.features.compliance&&m.features.compliance.mode)||'report')}catch(e){process.stdout.write('report')}")
          echo "Compliance gate enforcement mode: $MODE"
          if [ "$MODE" = "block" ]; then echo "nofail=" >> "$GITHUB_OUTPUT"; else echo "nofail=--no-fail" >> "$GITHUB_OUTPUT"; fi

      - name: Privacy & compliance gate
        run: |
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          node scripts/compliance/index.mjs ${{ steps.rh.outputs.nofail }} --json .compliance/compliance.json | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
