# QA — opt-in, Gemini-driven exploratory QA of a pull request's preview.
#
# Opt-in: comment "/qa" on a pull request to trigger it. A Gemini 3.5 Flash
# computer-use agent drives a real browser against the PR's Vercel preview and
# explores it like a user (no dev tools, no direct URL entry), then posts what
# it found graded by criticality.
#
#   /qa            → scoped: focus on the areas this PR changed (cheap default)
#   /qa all        → full-app sweep (use before a release / high-blast-radius PR)
#   /qa <url>      → test an explicit URL instead of the resolved preview
#
# Setup: add a GEMINI_API_KEY repository secret.

name: QA

on:
  issue_comment:
    types: [created]

permissions:
  # write: the run commits the distilled QA memory to .github/sentinel/QA-MEMORY.md
  # on main (via the contents API, with [skip ci] so it doesn't retrigger CI).
  contents: write
  pull-requests: write
  # Required to react to the triggering /qa comment (an issue comment): the
  # reactions endpoint is /repos/{o}/{r}/issues/comments/{id}/reactions.
  issues: write
  # Resolve the PR's preview URL: deployments → the Vercel deployment's
  # environment_url (the working path for backresto), statuses → the vercel.app
  # commit-status fallback. A `permissions:` block is exhaustive, so without
  # these the lookups 403 with "Resource not accessible by integration".
  deployments: read
  statuses: read

jobs:
  qa:
    # Match the `/qa` command on a word boundary — exact, or followed by a space
    # (so `/qa`, `/qa all`, `/qa <url>` fire, but `/qap`, `/qa-foo` etc. don't,
    # which would otherwise burn Gemini tokens on unrelated comments).
    # Gate on author association too: `/qa` (esp. `/qa all`) drives an expensive
    # browser+Gemini sweep, so only a repo owner/member/collaborator may trigger
    # it — a drive-by commenter on an open PR can't burn the budget. (This is
    # stricter than /review and /debate on purpose, given the cost asymmetry.)
    # `/qa all` is handled by the gate/shard/aggregate jobs below; exclude it here.
    if: >-
      ${{ github.event.issue.pull_request
        && (github.event.comment.body == '/qa' || (startsWith(github.event.comment.body, '/qa ') && !startsWith(github.event.comment.body, '/qa all')))
        && contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association) }}
    # Job-level (not workflow-level) concurrency, for the same reason as the
    # review/debate jobs: workflow-level groups resolve before the job `if`, so a
    # non-"/qa" comment would join and cancel a run mid-explore. Keyed by COMMENT
    # id with cancel-in-progress off so two /qa runs on one PR don't cancel each
    # other; the per-comment group still collapses duplicate deliveries.
    concurrency:
      group: qa-pr-${{ github.event.issue.number }}-${{ github.event.comment.id }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      # The QA code runs from the BASE branch (trusted) — it executes with the
      # GEMINI_API_KEY secret, so it must not be PR-authored code. It only drives
      # a browser against the already-deployed preview; it never runs PR code.
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install QA dependencies
        working-directory: .github/sentinel
        run: npm ci --no-audit --no-fund

      - name: Install Playwright Chromium
        working-directory: .github/sentinel
        run: npx playwright install --with-deps chromium

      - name: QA pull request
        working-directory: .github/sentinel
        run: npm run qa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Distils each run into the QA memory (cheap GLM model via OpenRouter).
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Optional: a disposable test account so QA explores behind the login
          # wall. If unset, QA stays on the logged-out surface.
          QA_LOGIN_EMAIL: ${{ secrets.QA_LOGIN_EMAIL }}
          QA_LOGIN_PASSWORD: ${{ secrets.QA_LOGIN_PASSWORD }}
          # Optional: the test account's staff PIN, so QA passes the PIN gate.
          QA_PIN: ${{ secrets.QA_PIN }}
          # Session-video upload → private Vercel Blob store (RW token auth).
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          BLOB_STORE_ID: ${{ secrets.BLOB_STORE_ID }}

  # ── /qa all: gate → shard (matrix) → aggregate ────────────────────────────
  #
  # gate:      resolve PR head sha + preview URL, enumerate domains, post a
  #            "QA in progress" status comment.
  # shard:     fan-out matrix — each domain gets its own runner + browser sweep,
  #            writes a ShardResult JSON to QA_SHARD_OUT, uploads as artifact.
  # aggregate: download all shard artifacts, synthesise rollup comment + ledger.

  gate:
    if: >-
      ${{ github.event.issue.pull_request
        && (github.event.comment.body == '/qa all' || startsWith(github.event.comment.body, '/qa all '))
        && contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association) }}
    concurrency:
      group: qa-pr-${{ github.event.issue.number }}-${{ github.event.comment.id }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.gate.outputs.url }}
      domains: ${{ steps.gate.outputs.domains }}
      status_id: ${{ steps.gate.outputs.status_id }}
      pr: ${{ steps.pr.outputs.number }}
      head_sha: ${{ steps.pr.outputs.head_sha }}
    steps:
      # Run from the BASE branch (trusted) — same rationale as the qa job above.
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve PR number + head sha
        id: pr
        run: |
          echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          HEAD=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }} --jq .head.sha)
          echo "head_sha=$HEAD" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install sentinel deps
        working-directory: .github/sentinel
        run: npm ci --no-audit --no-fund

      - name: Gate (enumerate domains + resolve preview)
        id: gate
        working-directory: .github/sentinel
        run: npx tsx src/qa.ts
        env:
          QA_GATE: "1"
          QA_PR: ${{ steps.pr.outputs.number }}
          QA_HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  shard:
    needs: gate
    if: ${{ needs.gate.outputs.domains != '' && needs.gate.outputs.domains != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        domain: ${{ fromJSON(needs.gate.outputs.domains) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install sentinel deps
        working-directory: .github/sentinel
        run: npm ci --no-audit --no-fund

      - name: Install Playwright Chromium
        working-directory: .github/sentinel
        run: npx playwright install --with-deps chromium

      - name: Shard ${{ matrix.domain }}
        working-directory: .github/sentinel
        run: npx tsx src/qa.ts
        env:
          QA_SHARD_DOMAIN: ${{ matrix.domain }}
          QA_TARGET_URL: ${{ needs.gate.outputs.url }}
          # Unique filename per domain so merge-multiple in aggregate doesn't collide.
          QA_SHARD_OUT: ${{ github.workspace }}/shard-${{ matrix.domain }}.json
          QA_PR: ${{ needs.gate.outputs.pr }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          QA_LOGIN_EMAIL: ${{ secrets.QA_LOGIN_EMAIL }}
          QA_LOGIN_PASSWORD: ${{ secrets.QA_LOGIN_PASSWORD }}
          QA_PIN: ${{ secrets.QA_PIN }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          BLOB_STORE_ID: ${{ secrets.BLOB_STORE_ID }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-shard-${{ matrix.domain }}
          path: ${{ github.workspace }}/shard-${{ matrix.domain }}.json
          if-no-files-found: ignore

  aggregate:
    needs: [gate, shard]
    if: ${{ always() && needs.gate.result == 'success' && needs.gate.outputs.domains != '[]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install sentinel deps
        working-directory: .github/sentinel
        run: npm ci --no-audit --no-fund

      - name: Ensure shards directory exists
        run: mkdir -p ${{ github.workspace }}/shards

      - uses: actions/download-artifact@v4
        with:
          path: ${{ github.workspace }}/shards
          pattern: qa-shard-*
          merge-multiple: true

      - name: Aggregate shard results
        working-directory: .github/sentinel
        run: npx tsx src/qa.ts
        env:
          QA_AGGREGATE_DIR: ${{ github.workspace }}/shards
          QA_TARGET_URL: ${{ needs.gate.outputs.url }}
          QA_PR: ${{ needs.gate.outputs.pr }}
          QA_STATUS_ID: ${{ needs.gate.outputs.status_id }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
