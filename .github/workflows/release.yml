name: Release
on:
  push:
    tags: ['v*']
# NOTE: Before the first publish:
#   (a) The unscoped name "gatekit" is taken on npmjs.com — publish under a scope like
#       "@<your-npm-username>/gatekit" in packages/cli/package.json first.
#   (b) Configure a Trusted Publisher once on npmjs.com:
#       Package Settings → Trusted Publisher → GitHub → repo PaulCailly/gatekit,
#       workflow "release.yml". No NPM_TOKEN secret needed after that.
permissions:
  contents: write
  id-token: write   # required for npm OIDC Trusted Publishing
jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      # npm >= 11.5.0 is required for Trusted Publishing (OIDC) support
      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest && npm --version
      - run: npm install
      - run: npm run build
      - run: npm test
      - name: Assert tag matches registry version
        working-directory: packages/cli
        run: |
          REG=$(node -e "process.stdout.write(require('./registry.json').version)")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$REG" != "$TAG" ]; then echo "Tag $TAG != registry.json version $REG"; exit 1; fi
      - run: npm version --no-git-tag-version "${GITHUB_REF_NAME#v}"
      # Trusted Publishing: OIDC token used automatically — no NODE_AUTH_TOKEN needed
      - run: npm publish --provenance --access public
      - uses: softprops/action-gh-release@v2
